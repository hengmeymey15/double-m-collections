<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="../public/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOUBLE-M | Products</title>
    <link rel="stylesheet" href="../src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="font-[Poppins]">
    <!-- header (using component navbar from the components folder) -->
    <header>
      <div id="navbar"></div>
    </header>

    <main class="center-page md:pt-[132px]">
      <section>
        <h1 class="text-[1.75rem] font-extrabold text-primary mb-8">
          Shopping Cart
        </h1>

        <div class="flex flex-col lg:flex-row gap-8 items-start">
          <div class="flex-[2] w-full">
            <div
              id="cart-container"
              class="bg-white border border-border-color rounded-xl overflow-hidden"
            ></div>

            <div
              id="empty-cart"
              class="hidden flex-col items-center justify-center py-20 bg-white border border-border-color rounded-xl text-center"
            >
              <i
                class="fa-solid fa-cart-shopping text-[4rem] text-gray-200 mb-5"
              ></i>
              <h2 class="text-2xl font-bold text-primary mb-2">
                Your cart is empty
              </h2>
              <p class="text-text-description mb-6">
                Looks like you haven't added anything yet.
              </p>
              <a
                href="/"
                class="bg-accent text-white py-3 px-7 rounded-lg font-semibold transition-colors hover:bg-accent-hover"
                >Start Shopping</a
              >
            </div>
          </div>

          <div class="flex-1 w-full lg:sticky lg:top-24">
            <div
              class="bg-white border border-border-color rounded-xl p-6 mb-5"
            >
              <h2 class="text-lg font-extrabold mb-5">Order Summary</h2>

              <div class="summary-row">
                <span>Subtotal</span> <span id="subtotal">$0.00</span>
              </div>
              <div class="summary-row">
                <span>Shipping</span> <span id="shipping">Free</span>
              </div>
              <div id="promo-row" class="summary-row hidden text-green-500">
                <span>Discount</span> <span id="discount">-$0.00</span>
              </div>

              <div class="summary-total">
                <span>Total</span> <span id="total">$0.00</span>
              </div>

              <button
                class="w-full bg-primary text-white py-4 rounded-xl font-bold text-base mt-6 transition-opacity hover:opacity-90 flex items-center justify-center gap-2"
                onclick="handleCheckout()"
              >
                Checkout <i class="fa-solid fa-arrow-right"></i>
              </button>
            </div>

            <div class="bg-white border border-border-color rounded-xl p-5">
              <p class="text-[0.9rem] font-semibold mb-3">Promo Code</p>
              <div class="flex gap-2">
                <input
                  type="text"
                  id="promo-input"
                  placeholder="Enter code"
                  class="flex-1 border border-border-color rounded-lg px-3.5 py-2.5 text-[0.9rem] focus:outline-accent"
                />
                <button
                  onclick="applyPromo()"
                  class="bg-white border border-primary text-primary px-4 rounded-lg font-bold text-[0.85rem] transition-colors hover:bg-primary hover:text-white"
                >
                  Apply
                </button>
              </div>
              <p id="promo-msg" class="text-[0.75rem] mt-2"></p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div
      id="toast"
      class="fixed bottom-7 left-1/2 -translate-x-1/2 translate-y-[100px] bg-primary text-white py-3.5 px-7 rounded-lg text-[0.9rem] font-medium z-[9999] opacity-0 flex items-center gap-2.5 min-w-[240px]"
    >
      <i class="fa-solid fa-circle-check text-accent text-lg"></i>
      <span id="toast-msg">Updated!</span>
    </div>

    <!-- footer (using component footer from the components folder)-->
    <footer>
      <div id="footer"></div>
    </footer>

    <script type="module">
      fetch("/src/components/navbar.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("navbar").innerHTML = data;
        });
    </script>
    <!-- footer component script -->
    <script type="module">
      fetch("/src/components/footer.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("footer").innerHTML = data;
        });
    </script>

    <script>
      let promoDiscount = 0;

      function getCart() {
        try {
          return JSON.parse(localStorage.getItem("dm_cart") || "[]");
        } catch {
          return [];
        }
      }
      function saveCart(c) {
        localStorage.setItem("dm_cart", JSON.stringify(c));
      }

      function updateBadges() {
        const cart = getCart();
        const cc = document.getElementById("cart-count");
        const wc = document.getElementById("wishlist-count");
        if (cc) cc.textContent = cart.reduce((s, i) => s + i.qty, 0);
        const w = JSON.parse(localStorage.getItem("dm_wishlist") || "[]");
        if (wc) wc.textContent = w.length;
      }

      function showToast(msg) {
        const t = document.getElementById("toast");
        document.getElementById("toast-msg").textContent = msg;
        t.classList.add("opacity-100", "translate-y-0");
        t.classList.remove("opacity-0", "translate-y-[100px]");
        setTimeout(() => {
          t.classList.remove("opacity-100", "translate-y-0");
          t.classList.add("opacity-0", "translate-y-[100px]");
        }, 2500);
      }

      function renderCart() {
        const cart = getCart();
        const container = document.getElementById("cart-container");
        const empty = document.getElementById("empty-cart");

        if (cart.length === 0) {
          container.classList.add("hidden");
          empty.classList.replace("hidden", "flex");
          updateSummary();
          return;
        }

        container.classList.remove("hidden");
        empty.classList.replace("flex", "hidden");

        container.innerHTML = cart
          .map(
            (item, idx) => `
          <div class="cart-item" id="item-${idx}">
            <img src="${item.image}" class="w-24 h-28 object-cover rounded-lg border border-border-color" />
            <div class="flex-1 flex flex-col">
              <div class="flex justify-between mb-1">
                <h3 class="font-bold text-primary text-[1.05rem] m-0">${item.name}</h3>
                <button onclick="removeItem(${idx}, '${item.size}')" class="bg-transparent border-none text-gray-400 cursor-pointer hover:text-red-500 transition-colors"><i class="fa-regular fa-trash-can"></i></button>
              </div>
              <p class="text-text-description text-[0.85rem] mb-3">Size: <span class="text-primary font-medium uppercase">${item.size}</span></p>
              
              <div class="mt-auto flex justify-between items-center">
                <div class="flex items-center gap-2">
                  <button class="qty-btn" onclick="updateQty(${idx}, -1)"><i class="fa-solid fa-minus text-[0.7rem]"></i></button>
                  <span class="w-8 text-center font-bold text-[0.95rem]">${item.qty}</span>
                  <button class="qty-btn" onclick="updateQty(${idx}, 1)"><i class="fa-solid fa-plus text-[0.7rem]"></i></button>
                </div>
                <div class="flex flex-col items-end">
                   <span class="font-extrabold text-primary">$${(item.price * item.qty).toFixed(2)}</span>
                   <button onclick="saveToWishlist('${item.id}', '${item.size}')" class="bg-transparent border-none text-accent text-[0.75rem] font-medium cursor-pointer underline p-0 mt-1">Save for later</button>
                </div>
              </div>
            </div>
          </div>
        `,
          )
          .join("");

        updateSummary();
        updateBadges();
      }

      function updateQty(idx, delta) {
        const cart = getCart();
        cart[idx].qty += delta;
        if (cart[idx].qty < 1) cart[idx].qty = 1;
        saveCart(cart);
        renderCart();
      }

      function removeItem(idx, size) {
        const el = document.getElementById(`item-${idx}`);
        el.classList.add("removing");
        setTimeout(() => {
          const cart = getCart();
          cart.splice(idx, 1);
          saveCart(cart);
          renderCart();
        }, 300);
      }

      function updateSummary() {
        const cart = getCart();
        const sub = cart.reduce((s, i) => s + i.price * i.qty, 0);
        const total = Math.max(0, sub - promoDiscount);

        document.getElementById("subtotal").textContent = `$${sub.toFixed(2)}`;
        document.getElementById("total").textContent = `$${total.toFixed(2)}`;

        const pr = document.getElementById("promo-row");
        if (promoDiscount > 0) {
          pr.classList.remove("hidden");
          document.getElementById("discount").textContent =
            `-$${promoDiscount.toFixed(2)}`;
        } else {
          pr.classList.add("hidden");
        }
      }

      function saveToWishlist(id, size) {
        const cart = getCart();
        const item = cart.find((i) => i.id === id && i.size === size);
        let w = JSON.parse(localStorage.getItem("dm_wishlist") || "[]");
        if (!w.find((i) => i.id === id)) {
          w.push({
            id: item.id,
            name: item.name,
            price: item.price,
            originalPrice: item.originalPrice,
            image: item.image,
          });
          localStorage.setItem("dm_wishlist", JSON.stringify(w));
        }
        const idx = cart.findIndex((i) => i.id === id && i.size === size);
        removeItem(idx, size);
        showToast(`Saved to wishlist!`);
      }

      const VALID_PROMOS = { SAVE10: 10, DOUBLE20: 20, WELCOME5: 5 };
      function applyPromo() {
        const code = document
          .getElementById("promo-input")
          .value.trim()
          .toUpperCase();
        const msg = document.getElementById("promo-msg");
        if (VALID_PROMOS[code]) {
          promoDiscount = VALID_PROMOS[code];
          msg.className = "text-[0.75rem] mt-2 text-green-500";
          msg.textContent = `✓ Code "${code}" applied — $${promoDiscount.toFixed(2)} off!`;
          updateSummary();
          showToast(`Promo applied!`);
        } else {
          msg.className = "text-[0.75rem] mt-2 text-red-500";
          msg.textContent = "Invalid code. Try: SAVE10, DOUBLE20";
        }
      }

      function handleCheckout() {
        showToast("Redirecting to checkout...");
      }

      renderCart();
    </script>
  </body>
</html>
