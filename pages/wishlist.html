<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="../public/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOUBLE-M | Favorite</title>
    <link rel="stylesheet" href="../src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="font-[Poppins]">
    <!-- header (using component navbar from the components folder) -->
    <header>
      <div id="navbar"></div>
    </header>

    <main class="center-page md:pt-[132px]">
      <section>
        <!-- show wishist items (if we have)-->
        <div id="wishlist-header" class="mb-8 flex items-center justify-between flex-wrap gap-3">
          <div>
            <h1 class="text-[1.75rem] font-extrabold text-primary m-0">
              My Wishlist
            </h1>
            <p
              id="wish-subtitle"
              class="text-text-description text-[0.9rem] mt-1"
            ></p>
          </div>
          <button
            id="add-all-btn"
            class="hidden bg-primary text-white border-none rounded-lg py-2.5 px-5 text-[0.9rem] font-semibold cursor-pointer transition-opacity flex items-center gap-2 hover:opacity-80"
          >
            <i class="fa-solid fa-cart-plus"></i> Add All to Cart
          </button>
        </div>

        <div
          id="wishlist-grid"
          class="grid grid-cols-[repeat(auto-fill,minmax(240px,1fr))] gap-6"
        ></div>

        <!-- show this in case no items is in favorite -->
        <div
          id="empty-state"
          class="hidden flex-col items-center justify-center py-20 px-5 text-center"
        >
          <i class="fa-regular fa-heart text-[4rem] text-gray-200 mb-5"></i>
          <h2 class="text-2xl font-bold text-primary mb-2">
            Your wishlist is empty
          </h2>
          <p class="text-text-description mb-6">
            Save your favourite items here and come back to them later.
          </p>
          <a
            href="/"
            class="bg-accent text-white py-3 px-7 rounded-lg font-semibold transition-colors hover:bg-accent-hover"
          >
            <i class="fa-solid fa-arrow-left mr-2"></i>Continue Shopping
          </a>
        </div>
        
      </section>
    </main>

    <div
      id="toast"
      class="fixed bottom-7 left-1/2 -translate-x-1/2 translate-y-[100px] bg-primary text-white py-3.5 px-7 rounded-lg text-[0.9rem] font-medium z-[9999] opacity-0 flex items-center gap-2.5 min-w-[240px]"
    >
      <i class="fa-solid fa-circle-check text-accent text-lg"></i>
      <span id="toast-msg">Done!</span>
    </div>

    <!-- footer (using component footer from the components folder)-->
    <footer>
      <div id="footer"></div>
    </footer>

    <script type="module">
      fetch("/src/components/navbar.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("navbar").innerHTML = data;
        });
    </script>

    <!-- footer component script -->
    <script type="module">
      fetch("/src/components/footer.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("footer").innerHTML = data;
        });
    </script>
    <!-- wishlist -->
    <script type="module" src="/src/js/wishlist.js"></script>
  </body>
</html>
